<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>caesar cipher</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="bg-grid"></div>

  <div class="container">
    <main class="card">

      <!-- INPUTS -->
      <section class="section">
        <h2 class="section-title"><span class="num">01</span> Student Identity</h2>
        <div class="input-grid">
          <div class="field">
            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" placeholder="e.g. ALICE REYES" autocomplete="off" />
          </div>
          <div class="field field--small">
            <label for="year">Year Level</label>
            <input type="number" id="year" placeholder="1–4" min="1" max="4" />
          </div>
          <div class="field">
            <label for="course">Course</label>
            <input type="text" id="course" placeholder="e.g. BSIT" autocomplete="off" />
          </div>
          <div class="field field--small">
            <label for="shift">Key N <span class="hint">(1–25)</span></label>
            <input type="number" id="shift" placeholder="3" min="1" max="25" value="3" />
          </div>
        </div>
      </section>

      <!-- PLAINTEXT PREVIEW -->
      <section class="section">
        <h2 class="section-title"><span class="num">02</span> Combined Plaintext</h2>
        <div class="output-box output-box--plain" id="plaintext-display">
          <span class="placeholder">Fill in your identity above…</span>
        </div>
      </section>

      <!-- BUTTONS -->
      <div class="btn-row">
        <button class="btn btn--encrypt" id="btn-encrypt" onclick="handleEncrypt()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          Encrypt
        </button>
        <button class="btn btn--decrypt" id="btn-decrypt" onclick="handleDecrypt()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/><line x1="12" y1="15" x2="12" y2="17"/></svg>
          Decrypt
        </button>
      </div>

      <!-- OUTPUT -->
      <section class="section">
        <h2 class="section-title"><span class="num">03</span> Output Result</h2>
        <div class="output-box output-box--cipher" id="output-display">
          <span class="placeholder">Click Encrypt or Decrypt to see the result…</span>
        </div>
        <div class="output-meta" id="output-meta"></div>
      </section>


    </main>

  </div>

  <script src="script.js"></script>
</body>
</html>
